    }));
  container.querySelectorAll("[data-action='copy-curl']").forEach(btn =>
    btn.addEventListener("click", () => {
      const node = nodesById.get(btn.dataset.id);
      if (node) copyToClipboard(buildCurlCommand(node), btn);
    }));
}

/* ============================== command palette ============================== */
const paletteState = { open: false, items: [], active: 0 };

function openPalette() {
  paletteState.open = true;
  document.getElementById("palette-overlay").classList.add("open");
  const input = document.getElementById("palette-input");
  input.value = "";
  runPaletteSearch("");
  requestAnimationFrame(() => input.focus());
}
function closePalette() {
  paletteState.open = false;
  document.getElementById("palette-overlay").classList.remove("open");
}

function runPaletteSearch(q) {
  const query = q.trim().toLowerCase();
  const scored = [];
  for (const n of GRAPH_DATA.nodes) {
    if (n.type === "FIELD" || n.type === "METHOD") continue;
    const name = n.name.toLowerCase();
    const path = String(n.attributes?.path || "").toLowerCase();
    let score = -1;
    if (!query) score = (n.type === "ENDPOINT" ? 3 : n.type === "CLASS" ? 2 : 1);
    else if (name.startsWith(query)) score = 100 - name.length;
    else if (name.includes(query)) score = 60 - name.length;
    else if (path.includes(query)) score = 50;
    else if (n.id.toLowerCase().includes(query)) score = 30;
    if (score >= 0) scored.push({ n, score });
  }
  scored.sort((a, b) => b.score - a.score);
  paletteState.items = scored.slice(0, 12).map(x => x.n);
  paletteState.active = 0;
  renderPaletteResults();
}

function renderPaletteResults() {
  const wrap = document.getElementById("palette-results");
  if (paletteState.items.length === 0) { wrap.innerHTML = `<div class="dash-empty">No matches.</div>`; return; }
  wrap.innerHTML = paletteState.items.map((n, i) => `
    <div class="palette-item ${i === paletteState.active ? 'active' : ''}" data-idx="${i}">
      <span class="ptype">${n.type.toLowerCase().replace(/_/g, " ")}</span>
      <span class="pname">${escapeHtml(n.name)}</span>
      <span class="pmeta">${escapeHtml((n.provenance?.file || "").split("/").pop() || "")}</span>
    </div>`).join("");
  wrap.querySelectorAll(".palette-item").forEach(item => {
    item.addEventListener("click", () => choosePaletteItem(+item.dataset.idx));
    item.addEventListener("mousemove", () => {
      paletteState.active = +item.dataset.idx;
      wrap.querySelectorAll(".palette-item").forEach((el, i) => el.classList.toggle("active", i === paletteState.active));
    });
  });
}

function choosePaletteItem(idx) {
  const node = paletteState.items[idx];
  if (!node) return;
  closePalette();
  // jump straight into the graph when the node is drawable there — the graph is home
  switchTab("graph");
  focusGraphNode(node.id);
}

document.getElementById("open-palette").addEventListener("click", openPalette);
document.getElementById("palette-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("palette-overlay")) closePalette();
});
document.getElementById("palette-input").addEventListener("input", e => runPaletteSearch(e.target.value));
document.getElementById("palette-input").addEventListener("keydown", e => {
  if (e.key === "ArrowDown") { e.preventDefault(); paletteState.active = Math.min(paletteState.active + 1, paletteState.items.length - 1); renderPaletteResults(); }
  if (e.key === "ArrowUp") { e.preventDefault(); paletteState.active = Math.max(paletteState.active - 1, 0); renderPaletteResults(); }
  if (e.key === "Enter") choosePaletteItem(paletteState.active);
  if (e.key === "Escape") closePalette();
});

/* ============================== graph: data + physics ============================== */
const STEREOTYPE_COLOR_VAR = {
  controller: "--node-controller", service: "--node-service", repository: "--node-repository",
  entity: "--node-entity", feignClient: "--node-external", component: "--node-config", configuration: "--node-config"
};
const TYPE_COLOR_VAR = {
  EXTERNAL_SERVICE: "--node-external", FEIGN_CLIENT: "--node-external", DATABASE: "--node-external",
  KAFKA_TOPIC: "--node-topic", QUEUE: "--node-topic", TABLE: "--node-entity",
  ENDPOINT: "--accent", PACKAGE: "--node-config", CONFIG_PROPERTY: "--node-config"
};
function colorVarFor(node) {
  return STEREOTYPE_COLOR_VAR[stereotypeOf(node)] || TYPE_COLOR_VAR[node.type] || "--node-plain";
}

const RELEVANT_EDGE_TYPES = new Set(["INJECTS", "DEPENDS_ON", "PUBLISHES_TO", "LISTENS_TO", "MAPS_TO", "EXPOSES"]);
const MAX_SIM_NODES = 170;

function topLevelGraphNodes() {
  return GRAPH_DATA.nodes.filter(n => {
    const st = stereotypeOf(n);
    return st && st !== "plain" || n.type === "EXTERNAL_SERVICE" || n.type === "FEIGN_CLIENT"
      || n.type === "KAFKA_TOPIC" || n.type === "QUEUE" || n.type === "TABLE" || n.type === "DATABASE"
      || n.type === "ENDPOINT";
  });
}
function scopedGraphNodes(scope) {
  const all = topLevelGraphNodes();
  if (scope === "controllers") return all.filter(n => ["controller", "service"].includes(stereotypeOf(n)) || n.type === "ENDPOINT");
  if (scope === "services") return all.filter(n => ["service", "repository", "feignClient"].includes(stereotypeOf(n)) || n.type === "TABLE" || n.type === "EXTERNAL_SERVICE" || n.type === "DATABASE");
  if (scope === "external") return all.filter(n => ["feignClient"].includes(stereotypeOf(n)) || n.type === "EXTERNAL_SERVICE" || n.type === "DATABASE" || n.type === "KAFKA_TOPIC" || n.type === "QUEUE" || stereotypeOf(n) === "service");
  return all;
}

const sim = { nodes: [], edges: [], byId: new Map(), physicsEnabled: true, alpha: 1 };
const graphState = {
  scope: "all", offsetX: 0, offsetY: 0, scale: 1,
  dragging: false, draggingNode: null, panLast: null,
  hoverId: null, needsResize: true, focusId: null,
  impactMode: false, impactDepth: 2
};

/**
 * Traces the "blast radius" of a node through the visual (class-level, deduped) graph: what
 * would be affected if you changed it (downstream — outgoing edges) and what depends on it
 * (upstream — incoming edges), out to `depth` hops. This is the everyday-refactoring question
 * ("what breaks if I touch this repository/service?") made visible without grepping the repo.
 */
function computeImpact(nodeId, depth) {
  const downstream = new Set(), upstream = new Set();
  const downstreamEdgeKeys = new Set(), upstreamEdgeKeys = new Set();
  const edgeKey = e => e.source + ">" + e.target;

  let frontier = [nodeId], visited = new Set([nodeId]), d = 0;
  while (frontier.length && d < depth) {
    const next = [];
    for (const id of frontier) {
      for (const e of sim.edges) {
        if (e.source !== id) continue;
        downstreamEdgeKeys.add(edgeKey(e));
        if (!visited.has(e.target)) { visited.add(e.target); downstream.add(e.target); next.push(e.target); }
      }
    }
    frontier = next; d++;
  }

  frontier = [nodeId]; visited = new Set([nodeId]); d = 0;
  while (frontier.length && d < depth) {
    const next = [];
    for (const id of frontier) {
      for (const e of sim.edges) {
        if (e.target !== id) continue;
        upstreamEdgeKeys.add(edgeKey(e));
        if (!visited.has(e.source)) { visited.add(e.source); upstream.add(e.source); next.push(e.source); }
      }
    }
    frontier = next; d++;
  }

  return { downstream, upstream, downstreamEdgeKeys, upstreamEdgeKeys };
}
const particles = [];

/** Method-level facts (e.g. "OrderService.placeOrder publishes to topic X") are drawn at class
 *  level in the graph view, since methods aren't rendered as nodes here. */
function liftToClass(id) {
  return id.startsWith("METHOD:") ? "CLASS:" + id.slice(7).split("#")[0] : id;
}

function buildGraphData() {
  let scopedNodes = scopedGraphNodes(graphState.scope);
  const idSet = new Set(scopedNodes.map(n => n.id));
  let edges = GRAPH_DATA.edges
    .filter(e => RELEVANT_EDGE_TYPES.has(e.type))
    .map(e => ({ ...e, source: liftToClass(e.source), target: liftToClass(e.target) }))
    .filter(e => e.source !== e.target && idSet.has(e.source) && idSet.has(e.target));
  // several methods of one class hitting the same target collapse into one visual edge
  const seen = new Set();
  edges = edges.filter(e => {
    const key = e.source + "|" + e.type + "|" + e.target;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  if (scopedNodes.length > MAX_SIM_NODES) {
    const degree = new Map();
    for (const e of edges) {
      degree.set(e.source, (degree.get(e.source) || 0) + 1);
      degree.set(e.target, (degree.get(e.target) || 0) + 1);
    }
    scopedNodes = [...scopedNodes].sort((a, b) => (degree.get(b.id) || 0) - (degree.get(a.id) || 0)).slice(0, MAX_SIM_NODES);
    const keptIds = new Set(scopedNodes.map(n => n.id));
    edges = edges.filter(e => keptIds.has(e.source) && keptIds.has(e.target));
  }

  const canvas = document.getElementById("graph-canvas");
  const w = canvas.clientWidth || 900, h = canvas.clientHeight || 600;
  const degree = new Map();
  for (const e of edges) {
    degree.set(e.source, (degree.get(e.source) || 0) + 1);
    degree.set(e.target, (degree.get(e.target) || 0) + 1);
  }

  sim.byId.clear();
  // seed radius scales with node count so dense graphs start spread out rather than
  // relying entirely on repulsion to un-clump hundreds of nodes from one small ring
  const seedRadius = Math.max(Math.min(w, h) * 0.34, 40 * Math.sqrt(scopedNodes.length));
  sim.nodes = scopedNodes.map((n, i) => {
    const angle = (i / scopedNodes.length) * Math.PI * 2;
    const radius = seedRadius;
    const node = {
      id: n.id, ref: n,
      x: w / 2 + Math.cos(angle) * radius + (Math.random() - 0.5) * 50,
      y: h / 2 + Math.sin(angle) * radius + (Math.random() - 0.5) * 50,
      vx: 0, vy: 0, fx: null, fy: null,
      degree: degree.get(n.id) || 0
    };
    sim.byId.set(n.id, node);
    return node;
  });
  sim.edges = edges.map(e => ({ ...e, s: sim.byId.get(e.source), t: sim.byId.get(e.target) })).filter(e => e.s && e.t);
  sim.alpha = 1;
  particles.length = 0;

  document.getElementById("graph-truncation-note")?.remove();
  if (scopedNodes.length < scopedGraphNodes(graphState.scope).length) {
    const note = document.createElement("div");
    note.id = "graph-truncation-note";
    note.textContent = `showing top ${scopedNodes.length} nodes by connectivity — use Ctrl K or Explorer for the rest`;
    document.body.appendChild(note);
  }
}

function nodeRadius(node) { return 4.5 + Math.min(10, Math.sqrt(node.degree) * 2); }

function stepSimulation() {
  const nodes = sim.nodes, n = nodes.length;
  const canvas = document.getElementById("graph-canvas");
  const w = canvas.clientWidth || 900, h = canvas.clientHeight || 600;

  // Hard collision separation — runs regardless of alpha/physics-enabled state, so nodes are
  // *guaranteed* never to sit on top of (or too near) each other, independent of how much the
  // spring/repulsion forces have decayed. This is what actually keeps the layout spread out.
  const PAD = 44;
  for (let i = 0; i < n; i++) {
    const a = nodes[i];
    for (let j = i + 1; j < n; j++) {
      const b = nodes[j];
      const minDist = nodeRadius(a) + nodeRadius(b) + PAD;
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.hypot(dx, dy);
      if (dist < 0.01) { dx = Math.random() - 0.5; dy = Math.random() - 0.5; dist = 0.01; }
      if (dist < minDist) {
        const overlap = (minDist - dist) / 2;
        const nx = dx / dist, ny = dy / dist;
        if (a.fx === null) { a.x -= nx * overlap; a.y -= ny * overlap; }
        if (b.fx === null) { b.x += nx * overlap; b.y += ny * overlap; }
      }
    }
  }

  if (!sim.physicsEnabled || sim.alpha <= 0.001) return;
  // decays to a full stop — a settled layout should read as a static, deliberate diagram,
  // not perpetual jitter; interactions (drag, re-layout, scope change) re-heat it briefly
  sim.alpha *= 0.985;

  const REPULSION = 15000, SPRING_LEN = 220, SPRING_K = 0.014, CENTER_K = 0.0012, DAMPING = 0.86;

  for (let i = 0; i < n; i++) {
    const a = nodes[i];
    if (a.fx !== null) continue;
    let fx = 0, fy = 0;
    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const b = nodes[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      let distSq = dx * dx + dy * dy;
      if (distSq < 1) distSq = 1;
      const dist = Math.sqrt(distSq);
      const force = (REPULSION * sim.alpha) / distSq;
      fx += (dx / dist) * force;
      fy += (dy / dist) * force;
    }
    fx += (w / 2 - a.x) * CENTER_K;
    fy += (h / 2 - a.y) * CENTER_K;
    a.vx = (a.vx + fx) * DAMPING;
    a.vy = (a.vy + fy) * DAMPING;
  }
  for (const e of sim.edges) {
    const dx = e.t.x - e.s.x, dy = e.t.y - e.s.y;
    const dist = Math.max(1, Math.hypot(dx, dy));
    const diff = (dist - SPRING_LEN) * SPRING_K * sim.alpha;
    const nx = dx / dist, ny = dy / dist;
    if (e.s.fx === null) { e.s.vx += nx * diff; e.s.vy += ny * diff; }
    if (e.t.fx === null) { e.t.vx -= nx * diff; e.t.vy -= ny * diff; }
  }
  for (const a of nodes) {
    if (a.fx !== null) { a.x = a.fx; a.y = a.fy; continue; }
    a.x += a.vx; a.y += a.vy;
  }
}

/* ============================== graph: rendering ============================== */
function resizeCanvas() {
  const canvas = document.getElementById("graph-canvas");
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
  canvas.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
  graphState.needsResize = false;
}
function worldToScreen(x, y) { return { x: x * graphState.scale + graphState.offsetX, y: y * graphState.scale + graphState.offsetY }; }
function screenToWorld(x, y) { return { x: (x - graphState.offsetX) / graphState.scale, y: (y - graphState.offsetY) / graphState.scale }; }

function edgeCurve(s1, s2) {
  const mx = (s1.x + s2.x) / 2, my = (s1.y + s2.y) / 2;
  const dx = s2.x - s1.x, dy = s2.y - s1.y;
  const dist = Math.max(1, Math.hypot(dx, dy));
  const off = dist * 0.12;
  return { cx: mx - (dy / dist) * off, cy: my + (dx / dist) * off };
}
function pointOnQuad(s1, c, s2, t) {
  const mt = 1 - t;
  return {
    x: mt * mt * s1.x + 2 * mt * t * c.cx + t * t * s2.x,
    y: mt * mt * s1.y + 2 * mt * t * c.cy + t * t * s2.y
  };
}

function spawnParticles() {
  const activeId = graphState.hoverId || graphState.focusId;
  if (activeId && particles.length < 90) {
    for (const e of sim.edges) {
      if (e.source !== activeId && e.target !== activeId) continue;
      if (Math.random() < 0.3) particles.push({ e, t: 0, speed: 0.008 + Math.random() * 0.012, ambient: false });
    }
  }
  // Ambient trickle: a light, continuous sense of data moving through the system even with
  // nothing focused — this is the "live" cue, kept separate from node positions (which stay
  // put) so the layout remains stable and readable while still feeling alive.
  if (sim.edges.length && particles.length < 55 && Math.random() < 0.55) {
    const e = sim.edges[Math.floor(Math.random() * sim.edges.length)];
    particles.push({ e, t: 0, speed: 0.005 + Math.random() * 0.006, ambient: true });
  }
}
function stepParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].t += particles[i].speed;
    if (particles[i].t >= 1) particles.splice(i, 1);
  }
}

function drawGraph() {
  if (graphState.needsResize) resizeCanvas();
  const canvas = document.getElementById("graph-canvas");
  const ctx = canvas.getContext("2d");
  const styles = getComputedStyle(document.documentElement);
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const dark = isDarkTheme();

  const bg = styles.getPropertyValue("--bg").trim();
  const textColor = styles.getPropertyValue("--text-dim").trim();
  const textFaint = styles.getPropertyValue("--text-faint").trim();
  const accentColor = styles.getPropertyValue("--accent").trim();
  const panelSolid = styles.getPropertyValue("--panel-solid").trim();
  const nodeStroke = styles.getPropertyValue(dark ? "--bg" : "--panel-solid").trim();

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // two faint, static corner washes for depth — no animation, no parallax
  const g1 = ctx.createRadialGradient(w * 0.1, 0, 0, w * 0.1, 0, w * 0.5);
  g1.addColorStop(0, styles.getPropertyValue("--bg-glow-1").trim());
  g1.addColorStop(1, "transparent");
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, w, h);
  const g2 = ctx.createRadialGradient(w, h, 0, w, h, w * 0.5);
  g2.addColorStop(0, styles.getPropertyValue("--bg-glow-2").trim());
  g2.addColorStop(1, "transparent");
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, w, h);

  // world-space dot grid — pans/zooms with the graph like a real canvas tool (Figma/Linear convention)
  const gridSpacing = 42;
  const step = gridSpacing * graphState.scale;
  if (step > 10) {
    const ox = ((graphState.offsetX % step) + step) % step;
    const oy = ((graphState.offsetY % step) + step) % step;
    ctx.fillStyle = textFaint;
    ctx.globalAlpha = dark ? 0.28 : 0.4;
    for (let gx = ox; gx < w; gx += step) {
      for (let gy = oy; gy < h; gy += step) {
        ctx.fillRect(gx - 0.6, gy - 0.6, 1.2, 1.2);
      }
    }
    ctx.globalAlpha = 1;
  }

  // Depth-1 dimming always applies around a focused node; when Impact mode is on, the traced
  // radius (and its directional coloring) extends to the chosen hop count instead.
  const activeImpact = (graphState.focusId && sim.byId.has(graphState.focusId))
    ? computeImpact(graphState.focusId, graphState.impactMode ? graphState.impactDepth : 1)
    : null;
  const focusNeighbors = activeImpact
    ? new Set([graphState.focusId, ...activeImpact.downstream, ...activeImpact.upstream])
    : null;
  const impactColoring = graphState.impactMode ? activeImpact : null;

  // edges: gradient strokes between endpoint colors
  for (const e of sim.edges) {
    const s1 = worldToScreen(e.s.x, e.s.y), s2 = worldToScreen(e.t.x, e.t.y);
    if (Math.max(s1.x, s2.x) < -40 || Math.min(s1.x, s2.x) > w + 40 || Math.max(s1.y, s2.y) < -40 || Math.min(s1.y, s2.y) > h + 40) continue;
    const c = edgeCurve(s1, s2);
    const dim = focusNeighbors && !(focusNeighbors.has(e.source) && focusNeighbors.has(e.target));
    const isActive = (graphState.hoverId && (e.source === graphState.hoverId || e.target === graphState.hoverId))
      || (graphState.focusId && (e.source === graphState.focusId || e.target === graphState.focusId) && !dim);

    let impactDir = null;
    if (impactColoring && !dim && !isActive) {
      const key = e.source + ">" + e.target;
      if (impactColoring.downstreamEdgeKeys.has(key)) impactDir = "down";
      else if (impactColoring.upstreamEdgeKeys.has(key)) impactDir = "up";
    }

    if (dim) {
      ctx.strokeStyle = "rgba(120,130,145,0.05)";
      ctx.lineWidth = 1;
    } else if (isActive) {
      ctx.strokeStyle = accentColor;
      ctx.lineWidth = 1.8;
    } else if (impactDir) {
      ctx.strokeStyle = styles.getPropertyValue(impactDir === "down" ? "--impact-down" : "--impact-up").trim();
      ctx.lineWidth = 1.6;
    } else {
      const sc = styles.getPropertyValue(colorVarFor(e.s.ref)).trim();
      const tc = styles.getPropertyValue(colorVarFor(e.t.ref)).trim();
      const grad = ctx.createLinearGradient(s1.x, s1.y, s2.x, s2.y);
      grad.addColorStop(0, sc);
      grad.addColorStop(1, tc);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1;
    }
    ctx.globalAlpha = dim ? 1 : (isActive || impactDir ? 0.95 : (dark ? 0.46 : 0.5));
    ctx.beginPath();
    ctx.moveTo(s1.x, s1.y);
    ctx.quadraticCurveTo(c.cx, c.cy, s2.x, s2.y);
    ctx.stroke();
    ctx.globalAlpha = 1;

    if (!dim && graphState.scale > 0.45 && (isActive || impactDir || graphState.scale > 0.8)) {
      const tEnd = 1 - (nodeRadius(e.t) * graphState.scale + 3) / Math.max(20, Math.hypot(s2.x - s1.x, s2.y - s1.y));
      const tip = pointOnQuad(s1, c, s2, Math.max(0.5, tEnd));
      const before = pointOnQuad(s1, c, s2, Math.max(0.4, tEnd - 0.05));
      const angle = Math.atan2(tip.y - before.y, tip.x - before.x);
      ctx.fillStyle = isActive ? accentColor
        : impactDir ? styles.getPropertyValue(impactDir === "down" ? "--impact-down" : "--impact-up").trim()
        : styles.getPropertyValue(colorVarFor(e.t.ref)).trim();
      ctx.globalAlpha = (isActive || impactDir) ? 1 : 0.5;
      ctx.beginPath();
      ctx.moveTo(tip.x, tip.y);
      ctx.lineTo(tip.x - 6.5 * Math.cos(angle - 0.42), tip.y - 6.5 * Math.sin(angle - 0.42));
      ctx.lineTo(tip.x - 6.5 * Math.cos(angle + 0.42), tip.y - 6.5 * Math.sin(angle + 0.42));
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // flow particles — ambient dots trickle along random edges everywhere (the "live" cue),
  // brighter accent-colored dots stream along whichever node is hovered/focused
  for (const p of particles) {
    const s1 = worldToScreen(p.e.s.x, p.e.s.y), s2 = worldToScreen(p.e.t.x, p.e.t.y);
    const c = edgeCurve(s1, s2);
    const pos = pointOnQuad(s1, c, s2, p.t);
    const pulse = Math.sin(p.t * Math.PI);
    if (p.ambient) {
      ctx.fillStyle = styles.getPropertyValue(colorVarFor(p.e.t.ref)).trim();
      ctx.globalAlpha = pulse * (dark ? 0.45 : 0.55);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = accentColor;
      ctx.globalAlpha = pulse * 0.95;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // nodes: flat, crisp discs with a background-matched stroke for separation — a subtle glow
  // ring is reserved for hover/focus only, so the resting state reads as a clean diagram
  for (const node of sim.nodes) {
    const s = worldToScreen(node.x, node.y);
    if (s.x < -40 || s.x > w + 40 || s.y < -40 || s.y > h + 40) continue;
    const dim = focusNeighbors && !focusNeighbors.has(node.id);
    const r = Math.max(2.5, nodeRadius(node) * graphState.scale);
    const color = styles.getPropertyValue(colorVarFor(node.ref)).trim();
    const isHover = node.id === graphState.hoverId;
    const isFocus = node.id === graphState.focusId;

    if (!dim && (isHover || isFocus)) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 14;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.globalAlpha = dim ? 0.12 : 1;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = Math.max(1, 1.4 * graphState.scale);
    ctx.strokeStyle = nodeStroke;
    ctx.stroke();

    if (isFocus) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.4;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(s.x, s.y, r + 7, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    } else if (impactColoring && !dim) {
      const ringColor = impactColoring.downstream.has(node.id) ? "--impact-down"
        : impactColoring.upstream.has(node.id) ? "--impact-up" : null;
      if (ringColor) {
        ctx.strokeStyle = styles.getPropertyValue(ringColor).trim();
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(s.x, s.y, r + 4, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    const showLabel = !dim && (isHover || isFocus || (graphState.scale > 0.65 && node.degree >= 1) || graphState.scale > 1.15);
    if (showLabel) {
      const label = truncate(node.ref.name, 24);
      ctx.font = (isHover || isFocus) ? "600 11px " + "monospace" : "10px monospace";
      const tw = ctx.measureText(label).width;
      const lx = s.x + r + 5;
      ctx.fillStyle = panelSolid;
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.roundRect(lx - 3, s.y - 8, tw + 8, 15, 4);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = (isHover || isFocus) ? styles.getPropertyValue("--text").trim() : textColor;
      ctx.fillText(label, lx, s.y + 3.5);
    }
  }
}

function renderLegend() {
  const legend = document.getElementById("graph-legend");
  const items = graphState.impactMode
    ? [["--impact-up", "upstream (calls this)"], ["--impact-down", "downstream (this calls)"]]
    : [
        ["--node-controller", "controller"], ["--node-service", "service"], ["--node-repository", "repo"],
        ["--accent", "endpoint"], ["--node-entity", "table"], ["--node-external", "external"], ["--node-topic", "topic"]
      ];
  legend.innerHTML = items.map(([c, l]) => `<span class="item"><span class="dot" style="background:var(${c});color:var(${c})"></span>${l}</span>`).join("");
}

/* ============================== graph: interaction ============================== */
function nodeAt(mx, my) {
  const world = screenToWorld(mx, my);
  let closest = null, closestDist = Infinity;
  for (const node of sim.nodes) {
    const d = Math.hypot(node.x - world.x, node.y - world.y);
    const hitRadius = nodeRadius(node) + 8 / graphState.scale;
    if (d < hitRadius && d < closestDist) { closest = node; closestDist = d; }
  }
  return closest;
}

function fitToView() {
  if (sim.nodes.length === 0) return;
  const canvas = document.getElementById("graph-canvas");
  const w = canvas.clientWidth, h = canvas.clientHeight;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of sim.nodes) {
    minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
    minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
  }
  const gw = Math.max(1, maxX - minX), gh = Math.max(1, maxY - minY);
  const scale = Math.min(2.5, Math.max(0.12, Math.min((w - 140) / gw, (h - 180) / gh)));
  graphState.scale = scale;
  graphState.offsetX = w / 2 - ((minX + maxX) / 2) * scale;
  graphState.offsetY = h / 2 - ((minY + maxY) / 2) * scale;
}

/** Pans/zooms the camera to center a node already in the current sim scope, if present. */
function panToNode(id) {
  const target = sim.byId.get(id);
  if (!target) return;
  const canvas = document.getElementById("graph-canvas");
  graphState.scale = Math.max(graphState.scale, 1.15);
  graphState.offsetX = canvas.clientWidth / 2 - target.x * graphState.scale;
  graphState.offsetY = canvas.clientHeight / 2 - target.y * graphState.scale;
}

function focusGraphNode(id) {
  graphState.focusId = id;
  if (!sim.byId.get(id)) {
    graphState.scope = "all";
    document.getElementById("graph-scope").value = "all";
    buildGraphData();
  }
  if (sim.byId.get(id)) {
    panToNode(id);
    openDrawer(id);
    updateHashForNode(id);
  } else {
    // not representable in the graph view (method/field/config) — show in explorer instead
    switchTab("explorer");
    selectNode(id);
  }
}

/** Back/forward history of nodes opened in the graph drawer, so exploring via edge clicks
 *  (which can wander several hops from where you started) doesn't strand you with no way back. */
const drawerHistory = { stack: [], index: -1 };

function openDrawer(id, opts = {}) {
  graphState.focusId = id;
  if (!opts.fromHistory) {
    drawerHistory.stack = drawerHistory.stack.slice(0, drawerHistory.index + 1);
    drawerHistory.stack.push(id);
    drawerHistory.index = drawerHistory.stack.length - 1;
  }
  renderDrawerContent(id);
  document.getElementById("graph-drawer").classList.add("open");
  if (!opts.fromHistory) updateHashForNode(id);
}

function renderDrawerContent(id) {
  document.getElementById("drawer-content").innerHTML = impactSummaryHtml(id) + buildDetailHtml(id, { showGraphJump: false });
  wireDetailHandlers(document.getElementById("drawer-content"));
  const backBtn = document.getElementById("drawer-back"), fwdBtn = document.getElementById("drawer-forward");
  backBtn.disabled = drawerHistory.index <= 0;
  fwdBtn.disabled = drawerHistory.index >= drawerHistory.stack.length - 1;
}

/** Re-renders the currently open drawer without touching history — used when impact-mode
 *  settings change so the summary reflects the new depth/toggle immediately. */
function refreshDrawerIfOpen() {
  if (document.getElementById("graph-drawer").classList.contains("open") && graphState.focusId) {
    renderDrawerContent(graphState.focusId);
  }
}

function drawerGoBack() {
  if (drawerHistory.index <= 0) return;
  drawerHistory.index--;
  const id = drawerHistory.stack[drawerHistory.index];
  panToNode(id);
  openDrawer(id, { fromHistory: true });
}
function drawerGoForward() {
  if (drawerHistory.index >= drawerHistory.stack.length - 1) return;
  drawerHistory.index++;
  const id = drawerHistory.stack[drawerHistory.index];
  panToNode(id);
  openDrawer(id, { fromHistory: true });
}
document.getElementById("drawer-back").addEventListener("click", drawerGoBack);
document.getElementById("drawer-forward").addEventListener("click", drawerGoForward);

/** Small info block shown at the top of the drawer when Impact mode is active, summarizing the
 *  blast radius of the focused node — the "what breaks if I change this" everyday question. */
function impactSummaryHtml(nodeId) {
  if (!graphState.impactMode) return "";
  if (!sim.byId.has(nodeId)) {
    return `<div class="impact-summary impact-na">Impact tracing isn't available for this node type in the graph view — see Explorer for its edges.</div>`;
  }
  const impact = computeImpact(nodeId, graphState.impactDepth);
  const depthLabel = graphState.impactDepth >= 999 ? "all hops" : graphState.impactDepth + (graphState.impactDepth === 1 ? " hop" : " hops");
  return `<div class="impact-summary">
    <div class="impact-row"><span class="impact-dot up"></span>${impact.upstream.size} upstream — call${impact.upstream.size===1?"s":""} or depend${impact.upstream.size===1?"s":""} on this</div>
    <div class="impact-row"><span class="impact-dot down"></span>${impact.downstream.size} downstream — what this calls or depends on</div>
    <div class="impact-hint">within ${depthLabel}. Upstream is your blast radius if you change this; downstream is what it relies on.</div>
  </div>`;
}

function closeDrawer() {
  document.getElementById("graph-drawer").classList.remove("open");
  graphState.focusId = null;
}
document.getElementById("drawer-close").addEventListener("click", closeDrawer);

/* ============================== shareable deep links ============================== */
function updateHashForNode(id) {
  try { history.replaceState(null, "", "#n=" + encodeURIComponent(id)); } catch (e) {}
}
function openFromHash() {
  const m = location.hash.match(/^#n=(.+)$/);
  if (!m) return;
  const id = decodeURIComponent(m[1]);
  if (!nodesById.has(id)) return;
  if (sim.byId.has(id) || topLevelGraphNodes().some(n => n.id === id)) {
    switchTab("graph");
    focusGraphNode(id);
  } else {
    switchTab("explorer");
    selectNode(id);
  }
}

function animate() {
  stepSimulation();
  spawnParticles();
  stepParticles();
  drawGraph();
  requestAnimationFrame(animate);
}

function initGraphInteraction() {
  const canvas = document.getElementById("graph-canvas");
  const tooltip = document.getElementById("graph-tooltip");

  canvas.addEventListener("mousedown", e => {
    const rect = canvas.getBoundingClientRect();
    const hit = nodeAt(e.clientX - rect.left, e.clientY - rect.top);
    if (hit) {
      graphState.draggingNode = hit;
      hit.fx = hit.x; hit.fy = hit.y;
      sim.alpha = Math.max(sim.alpha, 0.3);
    } else {
      graphState.dragging = true;
      graphState.panLast = { x: e.clientX, y: e.clientY };
    }
    canvas.classList.add("grabbing");
  });
  window.addEventListener("mouseup", () => {
    if (graphState.draggingNode) {
      graphState.draggingNode.fx = null;
      graphState.draggingNode.fy = null;
      graphState.draggingNode = null;
    }
    graphState.dragging = false;
    canvas.classList.remove("grabbing");
  });
  window.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;

    if (graphState.draggingNode) {
      const world = screenToWorld(mx, my);
      graphState.draggingNode.fx = world.x;
      graphState.draggingNode.fy = world.y;
      graphState.draggingNode.x = world.x;
      graphState.draggingNode.y = world.y;
      return;
    }
    if (graphState.dragging) {
      graphState.offsetX += e.clientX - graphState.panLast.x;
      graphState.offsetY += e.clientY - graphState.panLast.y;
      graphState.panLast = { x: e.clientX, y: e.clientY };
      return;
    }

    const hit = nodeAt(mx, my);
    if (hit) {
      graphState.hoverId = hit.id;
      const inC = (incoming.get(hit.id) || []).length, outC = (outgoing.get(hit.id) || []).length;
      tooltip.style.display = "block";
      tooltip.style.left = Math.min(mx + 14, rect.width - 340) + "px";
      tooltip.style.top = (my + 14) + "px";
      tooltip.innerHTML = `<div class="t">${hit.ref.type.toLowerCase().replace(/_/g, " ")}${stereotypeOf(hit.ref) ? " · " + stereotypeOf(hit.ref) : ""}</div>
        <div>${escapeHtml(hit.ref.name)}</div>
        <div style="color:var(--text-faint);font-size:10.5px;margin-top:3px">${inC} in · ${outC} out</div>`;
    } else {
      graphState.hoverId = null;
      tooltip.style.display = "none";
    }
  });
  canvas.addEventListener("click", () => {
    if (graphState.draggingNode) return;
    if (graphState.hoverId) {
      openDrawer(graphState.hoverId);
    } else {
      closeDrawer();
    }
  });
  canvas.addEventListener("dblclick", () => {
    if (graphState.hoverId) {
      closeDrawer();
      switchTab("explorer");
      selectNode(graphState.hoverId);
    }
  });
  canvas.addEventListener("wheel", e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const before = screenToWorld(mx, my);
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    graphState.scale = Math.max(0.1, Math.min(4, graphState.scale * factor));
    const after = screenToWorld(mx, my);
    graphState.offsetX += (after.x - before.x) * graphState.scale;
    graphState.offsetY += (after.y - before.y) * graphState.scale;
  }, { passive: false });

  document.getElementById("graph-scope").addEventListener("change", e => {
    graphState.scope = e.target.value;
    closeDrawer();
    buildGraphData();
    requestAnimationFrame(fitToView);
  });
  document.getElementById("graph-reset").addEventListener("click", () => {
    buildGraphData();
    requestAnimationFrame(fitToView);
  });
  document.getElementById("graph-center").addEventListener("click", fitToView);
  document.getElementById("graph-physics").addEventListener("change", e => {
    sim.physicsEnabled = e.target.checked;
    if (sim.physicsEnabled) sim.alpha = Math.max(sim.alpha, 0.3);
  });
  document.getElementById("impact-toggle").addEventListener("change", e => {
    graphState.impactMode = e.target.checked;
    document.getElementById("impact-depth").style.display = graphState.impactMode ? "" : "none";
    renderLegend();
    refreshDrawerIfOpen();
  });
  document.getElementById("impact-depth").addEventListener("change", e => {
    graphState.impactDepth = +e.target.value;
    refreshDrawerIfOpen();
  });

  const settingsBtn = document.getElementById("graph-settings-btn");
  const settingsPopover = document.getElementById("graph-settings-popover");
  settingsBtn.addEventListener("click", e => {
    e.stopPropagation();
    settingsPopover.classList.toggle("open");
  });
  document.addEventListener("click", e => {
    if (settingsPopover.classList.contains("open") && !settingsPopover.contains(e.target) && e.target !== settingsBtn) {
      settingsPopover.classList.remove("open");
    }
  });

  window.addEventListener("resize", () => { graphState.needsResize = true; });
}

/* ============================== init ============================== */
renderDashboard();
renderGraphStats();
renderTypeNav();
renderNodeList();
renderLegend();
buildGraphData();
initGraphInteraction();
window.addEventListener("hashchange", openFromHash);
requestAnimationFrame(() => {
  resizeCanvas();
  fitToView();
  openFromHash();
  requestAnimationFrame(animate);
});
</script>
</body>
</html>
